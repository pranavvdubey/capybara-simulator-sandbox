<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capybara Chill Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a1208;
      touch-action: none;
      font-family: 'Quicksand', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; width: 100%; height: 100%; position: fixed; inset: 0; }

    /* ── LOADING SCREEN ─────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: #0d1f0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200;
      gap: 16px;
    }
    #loading .title {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 3px;
      color: #8abf82;
    }
    #loading .bar {
      width: 180px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading .fill {
      height: 100%;
      background: linear-gradient(90deg, #5a9a5a, #8abf82);
      width: 0%;
      transition: width 0.25s ease;
    }
    #loading .sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    /* ── HUD SHELL ──────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
      display: none;
    }

    /* ── GLASS PANEL BASE ───────────────────────────────── */
    .glass {
      background: rgba(10, 14, 10, 0.55);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      border-radius: 16px;
    }

    /* ── BIOME SELECTOR (top-center) ────────────────────── */
    #biome-selector {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      white-space: nowrap;
    }

    .biome-arrow {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .biome-arrow:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
    }

    .biome-label-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .biome-prev-name,
    .biome-next-name {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.28);
      letter-spacing: 1px;
      text-transform: uppercase;
      min-width: 56px;
    }
    .biome-prev-name { text-align: right; }
    .biome-next-name { text-align: left; }
    .biome-cur-name {
      font-size: 17px;
      font-weight: 500;
      color: rgba(255,255,255,0.88);
      letter-spacing: 2px;
      text-transform: uppercase;
      min-width: 90px;
      text-align: center;
    }

    /* ── COMPANION SELECTOR (bottom-center) ─────────────── */
    #companion-selector {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      flex-wrap: nowrap;
    }

    .companion-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      color: rgba(255,255,255,0.60);
      cursor: pointer;
      padding: 10px 14px;
      font-family: 'Quicksand', sans-serif;
      transition: all 0.2s ease;
      min-width: 62px;
    }
    .companion-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.88);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .companion-btn.active {
      background: rgba(140,200,120,0.18);
      border-color: rgba(140,200,120,0.45);
      color: rgba(200,240,180,0.95);
      box-shadow: 0 0 12px rgba(140,200,100,0.12);
    }
    .companion-emoji { font-size: 22px; line-height: 1; }
    .companion-name  { font-size: 10px; font-weight: 400; letter-spacing: 0.5px; }
    .companion-empty {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      font-weight: 300;
    }

    /* ── RATING METER (right side) ──────────────────────── */
    #rating-meter {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      width: 52px;
    }

    .meter-label-top {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8abc8a;
      text-align: center;
      min-height: 14px;
      writing-mode: horizontal-tb;
    }
    .meter-label-bot {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    .meter-track {
      width: 8px;
      height: 140px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }
    .meter-fill {
      width: 100%;
      height: 10%;
      background: #6a8a7a;
      border-radius: 4px;
      transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.5s ease;
    }
    /* Threshold markers on the side — optional decorative ticks */
    .meter-markers {
      position: absolute;
      left: 110%;
      top: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 0;
      pointer-events: none;
    }
    .meter-marker {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meter-marker span {
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .meter-marker.active span {
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .meter-marker::before {
      content: '';
      display: block;
      width: 4px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .meter-marker.active::before {
      background: rgba(255,255,255,0.6);
    }

    /* ── CONTROLS (top-right) ────────────────────────────── */
    #controls {
      position: absolute;
      top: 18px;
      right: 20px;
      pointer-events: all;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
    }

    #controls button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      border-radius: 50%;
      width: 34px; height: 34px;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    #controls button:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
    }
    #controls button.active {
      color: rgba(180,240,200,0.95);
      background: rgba(120,200,130,0.15);
    }
    #controls button svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      #biome-selector { top: 12px; padding: 8px 14px; gap: 8px; }
      .biome-cur-name { font-size: 14px; }
      .biome-prev-name, .biome-next-name { font-size: 10px; min-width: 44px; }
      .biome-arrow { font-size: 15px; }

      #companion-selector { bottom: 16px; padding: 10px 14px; gap: 7px; }
      .companion-btn { padding: 8px 10px; min-width: 52px; }
      .companion-emoji { font-size: 18px; }

      #rating-meter { right: 10px; }
      .meter-track { height: 110px; }
      .meter-markers { display: none; }

      #controls { top: 12px; right: 10px; padding: 6px 8px; gap: 5px; }
      #controls button { width: 30px; height: 30px; }
      #controls button svg { width: 14px; height: 14px; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="title">Capybara Chill Scene</div>
    <div class="bar"><div class="fill" id="loadBar"></div></div>
    <div class="sub" id="loadText">loading...</div>
  </div>

  <!-- HUD overlay -->
  <div id="hud">
    <!-- Top-center: biome selector -->
    <div id="biome-selector" class="glass"></div>

    <!-- Top-right: controls -->
    <div id="controls" class="glass"></div>

    <!-- Right-side: rating meter -->
    <div id="rating-meter" class="glass"></div>

    <!-- Bottom-center: companion selector -->
    <div id="companion-selector" class="glass"></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
